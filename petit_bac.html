<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petit Bac - Multi & Solo</title>
    <style>
        :root {
            --primary: #6C5CE7; --secondary: #00CEC9; --dark: #2D3436;
            --light: #F9F9F9; --danger: #FF7675; --success: #55E6C1; 
            --warning: #FDCB6E; --radius: 16px;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: var(--dark); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container { 
            width: 95%; max-width: 1100px; background: white; padding: 30px; 
            border-radius: var(--radius); box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
            text-align: center; position: relative; overflow: hidden;
        }

        .screen { display: none; animation: slideUp 0.4s ease-out; }
        .screen.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: var(--primary); font-size: 2.5rem; margin-top: 0; }
        .mode-choice { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        
        button { 
            background: var(--primary); color: white; border: none; padding: 14px 28px; 
            border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-success { background: var(--success); color: var(--dark); }
        .btn-secondary { background: var(--secondary); }

        .setup-card { background: #f8f9fa; padding: 20px; border-radius: var(--radius); margin-bottom: 20px; text-align: left; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 15px 0; }
        .checkbox-item { background: white; padding: 12px; border-radius: 8px; border: 2px solid #eee; display: flex; align-items: center; font-size: 0.9rem;}
        
        #letter-spinner { font-size: 6rem; font-weight: 900; color: var(--primary); margin: 30px 0; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 25px 0; }
        
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--primary); color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        .status-pending { background-color: rgba(253, 203, 110, 0.15); border: 2px solid var(--warning); border-radius: 10px; }
        .status-valid { background-color: rgba(85, 230, 193, 0.15); border: 2px solid var(--success); border-radius: 10px; }
        .status-invalid { background-color: rgba(255, 118, 117, 0.15); border: 2px solid var(--danger); border-radius: 10px; }

        .action-icon { cursor: pointer; font-size: 1.3rem; filter: grayscale(1); margin: 0 5px; }
        .action-icon.active { filter: grayscale(0); transform: scale(1.2); }
        
        #room-id-display { font-family: monospace; background: #eee; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-menu" class="screen active">
        <h1>🖊️ Le Petit Bac</h1>
        <p>Choisissez votre mode de jeu :</p>
        <div class="mode-choice">
            <button onclick="chooseMode('solo')">👤 Mode Solo</button>
            <button class="btn-secondary" onclick="chooseMode('multi')">🌐 Mode Multi</button>
        </div>
    </div>

    <div id="screen-multi-choice" class="screen">
        <h2>🌐 Multijoueur</h2>
        <div class="setup-card">
            <h3>Créer une partie</h3>
            <button onclick="createRoom()">Créer une Room</button>
        </div>
        <div class="setup-card">
            <h3>Rejoindre une partie</h3>
            <input type="text" id="join-id" placeholder="Code de la Room (ex: 1234)">
            <button class="btn-secondary" onclick="joinRoom()">Rejoindre</button>
        </div>
        <button onclick="showScreen('screen-menu')">Retour</button>
    </div>

    <div id="screen-setup" class="screen">
        <h2 id="setup-title">Configuration</h2>
        <div class="setup-card">
            <label><strong>Thèmes :</strong></label>
            <div id="setup-cat-list" class="checkbox-grid"></div>
        </div>
        <div class="setup-card" style="display:flex; gap:20px;">
            <div id="rounds-box">
                <label>Tours :</label><br>
                <input type="number" id="rounds-count" value="3" min="1" style="width:50px; padding:8px;">
            </div>
            <div id="bots-box">
                <label>Bots :</label><br>
                <select id="bot-count" style="padding:8px;">
                    <option value="0">0</option><option value="1">1</option><option value="2" selected>2</option>
                </select>
            </div>
        </div>
        <button class="btn-success" id="btn-start" onclick="initGame()">Lancer le Jeu</button>
    </div>

    <div id="screen-lobby" class="screen">
        <h2>Lobby - Room <span id="room-id-display"></span></h2>
        <p>Joueurs connectés :</p>
        <ul id="player-list" style="list-style:none; padding:0; font-weight:bold;"></ul>
        <p id="lobby-wait-msg">En attente de l'hôte...</p>
        <button class="btn-success" id="btn-host-start" style="display:none;" onclick="hostStartGame()">Tout le monde est là !</button>
    </div>

    <div id="screen-letter" class="screen">
        <h2 id="letter-title">La lettre est...</h2>
        <div id="letter-spinner">?</div>
        <button id="btn-stop-spinner" onclick="stopSpinner()">STOP !</button>
    </div>

    <div id="screen-game" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <span id="info-round">Tour 1</span>
            <span class="letter-badge" id="info-letter" style="background:var(--primary); color:white; padding:5px 10px; border-radius:5px;">?</span>
        </div>
        <div id="game-inputs" class="category-grid"></div>
        <button class="btn-success" style="width:100%;" onclick="triggerFinish()">J'AI TOUT !</button>
    </div>

    <div id="screen-arbitrage" class="screen">
        <h2>Arbitrage - Lettre <span id="arb-letter"></span></h2>
        <div class="table-container">
            <table id="arb-table"></table>
        </div>
        <button class="btn-success" style="margin-top:20px;" id="btn-next-turn" onclick="confirmTurn()">Suivant</button>
    </div>
</div>

<script type="module">
    // --- FIREBASE CONFIG ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "TON_API_KEY",
        authDomain: "TON_PROJET.firebaseapp.com",
        databaseURL: "https://TON_PROJET-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "TON_PROJET",
        storageBucket: "TON_PROJET.appspot.com",
        appId: "TON_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- LOGIQUE JEU ---
    const BANK = {
        "Prénom Fille": ["Alice", "Ambre", "Anna"], "Prénom Garçon": ["Arthur", "Antoine"], "Fruit/Légume": ["Abricot", "Ananas"],
        "Pays/Ville": ["Alger", "Angers"], "Objet": ["Assiette", "Ampoule"], "Animaux": ["Aigle", "Ane"],
        "Métier": ["Acteur", "Avocat"], "Marque": ["Adidas", "Apple"], "Couleur": ["Bleu", "Blanc"], "Anatomie": ["Bras", "Bouche"]
    };

    let state = { 
        isMulti: false, isHost: false, roomId: null, 
        playerId: "P_" + Math.floor(Math.random()*1000),
        players: {}, currentRound: 1, letter: '', cats: Object.keys(BANK) 
    };

    window.chooseMode = (m) => {
        state.isMulti = (m === 'multi');
        if(state.isMulti) showScreen('screen-multi-choice');
        else {
            document.getElementById('bots-box').style.display = 'block';
            renderSetupCats();
            showScreen('screen-setup');
        }
    };

    window.showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    function renderSetupCats() {
        const div = document.getElementById('setup-cat-list');
        div.innerHTML = Object.keys(BANK).map(c => `<label class="checkbox-item"><input type="checkbox" checked value="${c}"> ${c}</label>`).join('');
    }

    // --- MULTI : ROOMS ---
    window.createRoom = () => {
        state.isHost = true;
        state.roomId = Math.floor(1000 + Math.random() * 8999).toString();
        document.getElementById('room-id-display').innerText = state.roomId;
        document.getElementById('btn-host-start').style.display = 'inline-block';
        
        set(ref(db, 'rooms/' + state.roomId), {
            status: 'lobby',
            config: { rounds: 3, cats: state.cats },
            hostId: state.playerId
        });

        joinLobby();
    };

    window.joinRoom = () => {
        state.roomId = document.getElementById('join-id').value;
        if(!state.roomId) return alert("Code requis");
        state.isHost = false;
        joinLobby();
    };

    function joinLobby() {
        // Ajouter le joueur
        const name = prompt("Ton pseudo :") || "Joueur";
        update(ref(db, `rooms/${state.roomId}/players/${state.playerId}`), { name: name, score: 0 });

        onValue(ref(db, `rooms/${state.roomId}`), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            // Liste des joueurs
            const list = document.getElementById('player-list');
            list.innerHTML = Object.values(data.players).map(p => `<li>${p.name}</li>`).join('');

            // Changement d'écran selon status
            if(data.status === 'setup' && state.isHost) {
                renderSetupCats();
                showScreen('screen-setup');
            } else if (data.status === 'playing') {
                state.letter = data.currentLetter;
                startRoundUI();
            } else if (data.status === 'arbitrage') {
                state.players = data.players; // Récupère les réponses des autres
                renderArbitrage();
            }
        });
        showScreen('screen-lobby');
    }

    window.hostStartGame = () => {
        update(ref(db, `rooms/${state.roomId}`), { status: 'setup' });
    };

    // --- JEU : LOGIQUE COMMUNE ---
    window.initGame = () => {
        state.cats = Array.from(document.querySelectorAll('#setup-cat-list input:checked')).map(i => i.value);
        if(state.isMulti) {
            update(ref(db, `rooms/${state.roomId}`), { 
                status: 'playing', 
                currentLetter: "A", // Exemple
                config: { cats: state.cats, rounds: document.getElementById('rounds-count').value }
            });
        } else {
            // Logique Solo existante
            startRoundUI();
        }
    };

    function startRoundUI() {
        showScreen('screen-game');
        document.getElementById('info-letter').innerText = state.letter;
        const area = document.getElementById('game-inputs');
        area.innerHTML = state.cats.map((c, i) => `
            <div class="category-item">
                <label style="font-size:0.8rem; font-weight:bold;">${c}</label>
                <input type="text" id="in-${i}" placeholder="...">
            </div>
        `).join('');
    }

    window.triggerFinish = () => {
        const answers = state.cats.map((_, i) => document.getElementById('in-'+i).value);
        if(state.isMulti) {
            update(ref(db, `rooms/${state.roomId}/players/${state.playerId}`), { answers: answers });
            update(ref(db, `rooms/${state.roomId}`), { status: 'arbitrage' });
        } else {
            // Mode Solo : Simulation Arbitrage
            state.players = { "P1": { name: "Vous", answers: answers, score: 0 } };
            renderArbitrage();
        }
    };

    function renderArbitrage() {
        showScreen('screen-arbitrage');
        const table = document.getElementById('arb-table');
        // Génération dynamique du tableau... (même logique que ton code précédent)
        // Mais cette fois, on boucle sur Object.values(state.players)
    }

</script>
</body>
</html>
